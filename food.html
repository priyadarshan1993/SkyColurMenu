<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MENU — Daily All Day Pune</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
 --sky:#e8f4ff;
 --primary:#0ea5e9;
 --text:#0f172a;
 --muted:#64748b;
 --card:#ffffff;
}

*{box-sizing:border-box}

body{
 margin:0;
 font-family:Inter,system-ui,Segoe UI,Arial;
 background:var(--sky);
 color:var(--text);
}

header{
 position:sticky;
 top:0;
 background:#fff;
 padding:14px 16px;
 font-weight:700;
 font-size:18px;
 border-bottom:1px solid #e2e8f0;
 z-index:1000;
}

.topbar{
 position:sticky;
 top:54px;
 background:#fff;
 padding:10px 12px;
 border-bottom:1px solid #e2e8f0;
 z-index:999;
}

.search{
 width:100%;
 padding:10px 12px;
 border-radius:10px;
 border:1px solid #e2e8f0;
 font-size:14px;
}

.filters{
 display:flex;
 gap:8px;
 margin-top:8px;
 overflow-x:auto;
}

.filters button{
 border:1px solid #e2e8f0;
 background:#fff;
 padding:6px 14px;
 border-radius:20px;
 font-size:12px;
 cursor:pointer;
 color:var(--muted);
}

.filters button.active{
 background:var(--primary);
 color:#fff;
 border-color:var(--primary);
}

.section{
 padding:10px;
}

.category{
 margin:18px 4px 8px;
 font-size:15px;
 font-weight:700;
 color:var(--primary);
}

.card{
 background:var(--card);
 border-radius:14px;
 padding:10px;
 margin-bottom:8px;
 box-shadow:0 2px 6px rgba(0,0,0,.05);
}

.item{
 display:flex;
 align-items:center;
 justify-content:space-between;
 cursor:pointer;
}

.left{
 display:flex;
 align-items:center;
 gap:10px;
 min-width:0;
}

.img{
 width:54px;
 height:54px;
 border-radius:12px;
 object-fit:cover;
}

.icon{
 width:16px;
 height:16px;
}

.name{
 font-size:14px;
 font-weight:600;
 white-space:nowrap;
 overflow:hidden;
 text-overflow:ellipsis;
}

.price{
 font-weight:700;
 color:var(--primary);
 font-size:15px;
}

/* MODAL */
#modal{
 display:none;
 position:fixed;
 inset:0;
 background:rgba(0,0,0,.4);
 backdrop-filter:blur(4px);
 z-index:2000;
 align-items:center;
 justify-content:center;
}

.modalBox{
 background:#fff;
 border-radius:16px;
 width:92%;
 max-width:380px;
 overflow:hidden;
 animation:pop .25s ease;
}

@keyframes pop{
 from{transform:scale(.9);opacity:.5}
 to{transform:scale(1);opacity:1}
}

.modalBox img{
 width:100%;
 height:230px;
 object-fit:cover;
}

.modalContent{
 padding:16px;
}

.modalName{
 font-weight:700;
 font-size:18px;
 margin-bottom:4px;
}

.modalType{
 font-size:13px;
 color:var(--muted);
 margin-bottom:6px;
}

.modalPrice{
 color:var(--primary);
 font-weight:700;
 margin-bottom:8px;
}

.modalDesc{
 font-size:13px;
 color:var(--muted);
 line-height:1.5;
}

.modalBtn{
 margin-top:14px;
 width:100%;
 border:none;
 border-radius:10px;
 padding:10px;
 font-weight:600;
 background:var(--primary);
 color:#fff;
 cursor:pointer;
}
</style>
</head>

<body>

<header>Daily All Day — Menu</header>

<div class="topbar">
<input class="search" id="search" placeholder="Search dishes...">
<div class="filters">
<button data-f="all" class="active">All</button>
<button data-f="veg">Veg</button>
<button data-f="nonveg">Non‑Veg</button>
</div>
</div>

<div class="section" id="menu"></div>

<div id="modal">
 <div class="modalBox">
   <img id="m_img">
   <div class="modalContent">
     <div id="m_name" class="modalName"></div>
     <div id="m_type" class="modalType"></div>
     <div id="m_price" class="modalPrice"></div>
     <div id="m_desc" class="modalDesc"></div>
     <button class="modalBtn" onclick="closeModal()">Close</button>
   </div>
 </div>
</div>

<script>
let ALL_ROWS=[];

function parseCSV(text){
 return text.trim().split("\n").slice(1).map(r=>{
   const cols=r.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g)||[];
   return cols.map(v=>v.replace(/^"|"$/g,"").trim());
 });
}

function openModal(d){
 document.getElementById("modal").style.display="flex";
 document.getElementById("m_img").src="images/"+d.img;
 document.getElementById("m_name").textContent=d.name;
 document.getElementById("m_price").textContent=d.price;
 document.getElementById("m_desc").textContent=d.desc;
 document.getElementById("m_type").textContent=d.type==="veg"?"🟢 Veg":"🔴 Non‑Veg";
}

function closeModal(){
 document.getElementById("modal").style.display="none";
}

function render(rows){
 const menu=document.getElementById("menu");
 menu.innerHTML="";

 rows.forEach(cols=>{
  const name=cols[0];
  const price=parseFloat(cols[1]);
  const desc=cols[2]||"";
  const type=(cols[3]||"").toLowerCase();
  const img=cols[4]||"";

  if(price===0){
   const h=document.createElement("div");
   h.className="category";
   h.textContent=name;
   menu.appendChild(h);
   return;
  }

  const card=document.createElement("div");
  card.className="card";

  const item=document.createElement("div");
  item.className="item";
  item.onclick=()=>openModal({name,price,desc,type,img});

  const left=document.createElement("div");
  left.className="left";

  if(img){
   const im=document.createElement("img");
   im.src="images/"+img;
   im.className="img";
   left.appendChild(im);
  }

  if(type==="veg"||type==="nonveg"){
   const ic=document.createElement("img");
   ic.className="icon";
   ic.src= type==="veg" ? "images/veg.webp" : "images/nonveg.webp";
   left.appendChild(ic);
  }

  const nm=document.createElement("div");
  nm.className="name";
  nm.textContent=name;
  left.appendChild(nm);

  const pr=document.createElement("div");
  pr.className="price";
  pr.textContent=price;

  item.appendChild(left);
  item.appendChild(pr);
  card.appendChild(item);
  menu.appendChild(card);
 });
}

function applyFilter(){
 const f=document.querySelector(".filters button.active").dataset.f;
 const q=document.getElementById("search").value.toLowerCase();

 const filtered=ALL_ROWS.filter(r=>{
  const price=parseFloat(r[1]);
  if(price===0) return true;

  const name=(r[0]||"").toLowerCase();
  const type=(r[3]||"").toLowerCase();

  if(q && !name.includes(q)) return false;
  if(f==="veg" && type!=="veg") return false;
  if(f==="nonveg" && type!=="nonveg") return false;

  return true;
 });

 render(filtered);
}

document.querySelectorAll(".filters button").forEach(b=>{
 b.onclick=()=>{
  document.querySelectorAll(".filters button").forEach(x=>x.classList.remove("active"));
  b.classList.add("active");
  applyFilter();
 };
});

document.getElementById("search").oninput=applyFilter;

fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vTuqOGAiEQYlgwacbHKi_QRJeVRYGQqFl844FbKFZye0Dbyy2GdFN-LnpcWXqDKdDWLyGYKYA2JeI1n/pub?gid=1882359850&single=true&output=csv&t="+Date.now())
 .then(r=>r.text())
 .then(t=>{
   ALL_ROWS=parseCSV(t);
   render(ALL_ROWS);
 });
</script>

</body>
</html>
